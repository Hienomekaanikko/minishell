name: minishell robot framework CI
on:
    push:
    pull_request:

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Install dependencies
              run: |
               sudo apt-get update
               sudo apt-get install -y python3 python3-pip g++ libreadline-dev
               pip3 install --break-system-packages --upgrade robotframework
            
            - name: Build minishell
              run: |
               make
            
            - name: Run robot tests
              run: robot --outputdir tests tests/test.robot

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                name: robot-results
                path: tests/output.xml